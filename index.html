<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магическое приглашение</title>

<style>
@font-face {
    font-family: 'Runic';
    src: url('Runic.ttf') format('truetype');
}

body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:serif;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
}

.bg{
    position:fixed;
    inset:0;
    background:url('photo.jpeg') center/cover no-repeat;
    z-index:0;
}

.dark{
    position:fixed;
    inset:0;
    background:rgba(0,0,8,0.6);
    z-index:1;
}

/* Название и дата */
.title{
    position:relative;
    z-index:5;
    color:#d4af37;
    font-family:'Runic', serif;
    text-align:center;
    text-shadow:0 0 15px #d4af37;
}

.title h1{
    font-size:72px;
    margin:0 0 15px 0;
}

.title p{
    font-size:36px;
    margin:0;
}

/* Кнопка */
button{
    padding:20px 50px;
    font-size:20px;
    background:black;
    color:#d4af37;
    border:2px solid #d4af37;
    cursor:pointer;
    letter-spacing:2px;
    position:relative;
    z-index:5;
    margin-top:30px;
}

button:hover{
    background:#111;
}

/* Взрыв рун */
.rune{
    position:fixed;
    font-size:22px;
    color:#d4af37;
    pointer-events:none;
    z-index:5;
}

/* Дождь рун */
.fall-rune{
    position:fixed;
    font-size:16px;
    color:#d4af37;
    opacity:0.15;
    pointer-events:none;
    z-index:2;
    user-select:none;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="dark"></div>

<div class="title">
    <h1>Сергей и Анастасия</h1>
    <p>18 июля</p>
    <button id="magicBtn">Открыть приглашение</button>
</div>

<!-- Музыка на фоне -->
<audio id="bgMusic" loop>
    <source src="The Witcher 3_ Wild Hunt OST — Velen Combat.mp3" type="audio/mpeg">
</audio>

<script>
// Руны для взрыва и дождя
const runes = ["ᚠ","ᚢ","ᚦ","ᚨ","ᚱ","ᚲ","ᚷ","ᚹ","ᚺ","ᚾ","ᛁ","ᛃ","ᛇ","ᛈ","ᛉ","ᛋ"];
const button = document.getElementById("magicBtn");

// === Взрыв рун при клике на кнопку ===
button.addEventListener("click", () => {
    const rect = button.getBoundingClientRect();
    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;

    for(let i = 0; i < 30; i++) {
        const rune = document.createElement("span");
        rune.classList.add("rune");
        rune.textContent = runes[Math.floor(Math.random() * runes.length)];

        rune.style.left = centerX + "px";
        rune.style.top = centerY + "px";

        document.body.appendChild(rune);

        const angle = Math.random() * Math.PI * 2;
        const radius = 300 + Math.random() * 300;

        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;

        rune.animate([
            { transform: "translate(0,0)", opacity:1 },
            { transform: `translate(${x}px, ${y}px) scale(0.3)`, opacity:0 }
        ],{
            duration:1000,
            easing:"ease-out"
        });

        setTimeout(() => rune.remove(), 1000);
    }
});

// === Дождь рун на фоне ===
function createFallingRune(){
    const rune = document.createElement("span");
    rune.classList.add("fall-rune");
    rune.textContent = runes[Math.floor(Math.random()*runes.length)];

    const x = Math.random() * window.innerWidth;
    const size = 12 + Math.random()*20;
    rune.style.left = x + "px";
    rune.style.top = -20 + "px";
    rune.style.fontSize = size + "px";

    document.body.appendChild(rune);

    const speed = 2000 + Math.random()*3000;

    rune.animate([
        { transform: `translateY(0px)` },
        { transform: `translateY(${window.innerHeight + 50}px)` }
    ],{
        duration: speed,
        easing: "linear"
    });

    setTimeout(()=>rune.remove(), speed);
}

setInterval(createFallingRune, 200);

// === Музыка на фоне ===
const music = document.getElementById("bgMusic");

window.addEventListener("load", () => {
    music.volume = 0.5;
    const playPromise = music.play();
    if (playPromise !== undefined) {
        playPromise.catch(error => {
            console.log("Автоплей заблокирован, музыка запустится по клику");
        });
    }
});

button.addEventListener("click", () => {
    if (music.paused) music.play();
});
</script>

</body>
</html>
